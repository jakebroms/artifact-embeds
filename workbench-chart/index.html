<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Workbench cases by topic</title>
<style>
:root{color-scheme:light}
html,body{margin:0;background:#fff;color:#0B2A4A;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
body{padding:18px 22px}
.title{margin:0 0 14px;font-size:12px;font-weight:850;letter-spacing:.09em;text-transform:uppercase;color:#3A526E}
.chart{display:grid;gap:9px}
.row{display:grid;grid-template-columns:minmax(170px,1.1fr) minmax(0,2.6fr) 32px;align-items:center;gap:12px;font-size:12.5px;font-weight:700}
.label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#0B2A4A}
.track{height:10px;background:#EAF2F8;overflow:hidden}
.fill{display:block;height:100%;width:var(--w);background:var(--c);transform:scaleX(1);transform-origin:left;animation:in 1.1s cubic-bezier(.2,.7,.2,1) both}
@keyframes in{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.count{text-align:right;color:#0B2A4A;font-weight:900;font-size:13.5px}
@media(prefers-reduced-motion:reduce){.fill{animation:none}}
@media(max-width:540px){.row{grid-template-columns:minmax(120px,1fr) minmax(0,2fr) 28px;gap:10px;font-size:11.5px}}
</style>
</head>
<body>
<p class="title">Use cases by topic</p>
<div class="chart">
  <div class="row"><span class="label">Cash forecasting &amp; visibility</span><span class="track"><span class="fill" style="--w:53.8%;--c:#143D6B;animation-delay:0ms"></span></span><span class="count">7</span></div>
  <div class="row"><span class="label">AR, credit &amp; collections</span><span class="track"><span class="fill" style="--w:100%;--c:#6A90D2;animation-delay:90ms"></span></span><span class="count">13</span></div>
  <div class="row"><span class="label">Treasury operations &amp; investments</span><span class="track"><span class="fill" style="--w:69.2%;--c:#717B4C;animation-delay:180ms"></span></span><span class="count">9</span></div>
  <div class="row"><span class="label">Internal audit &amp; SOX</span><span class="track"><span class="fill" style="--w:92.3%;--c:#7B4C71;animation-delay:270ms"></span></span><span class="count">12</span></div>
  <div class="row"><span class="label">Risk, compliance &amp; governance</span><span class="track"><span class="fill" style="--w:69.2%;--c:#6FA3A3;animation-delay:360ms"></span></span><span class="count">9</span></div>
  <div class="row"><span class="label">AI productivity &amp; knowledge tools</span><span class="track"><span class="fill" style="--w:23.1%;--c:#BA9659;animation-delay:450ms"></span></span><span class="count">3</span></div>
</div>

<script>
(function(){
  function postHeight(){
    var h = Math.ceil(document.documentElement.getBoundingClientRect().height);
    var msg = { src: location.href, context: 'iframe.resize', height: h };
    try { window.parent.postMessage(msg, '*'); } catch(e){}
    try { window.parent.postMessage(JSON.stringify(msg), '*'); } catch(e){}
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  if (window.ResizeObserver){ new ResizeObserver(postHeight).observe(document.documentElement); }
  else { setInterval(postHeight, 1000); }
  postHeight();
})();
</script></body>
</html>
